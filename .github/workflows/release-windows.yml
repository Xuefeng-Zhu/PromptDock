name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create or update the GitHub release as a draft"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows bundle
        uses: tauri-apps/tauri-action@v0

      - name: Collect release assets
        shell: pwsh
        run: |
          $assetDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $bundleDir = "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundleDir)) {
            Write-Error "Expected Windows bundle directory was not found."
            Get-ChildItem "src-tauri/target" -Recurse -Force
            exit 1
          }

          $assets = Get-ChildItem $bundleDir -Recurse -File | Where-Object { $_.Extension -in ".msi", ".exe" }
          if (-not $assets) {
            Write-Error "Expected Windows installer artifact was not found."
            Get-ChildItem "src-tauri/target" -Recurse -Force
            exit 1
          }

          $assets | Copy-Item -Destination $assetDir
          Get-ChildItem $assetDir

      - name: Upload Windows assets
        uses: actions/upload-artifact@v7
        with:
          name: promptdock-windows
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish Windows release assets
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_DRAFT: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
        run: |
          ls -la release-assets

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
            exit 0
          fi

          RELEASE_ARGS=(
            --title "PromptDock $TAG_NAME"
            --notes "Windows installer build."
            --target "$GITHUB_SHA"
          )

          if [ "$RELEASE_DRAFT" = "true" ]; then
            RELEASE_ARGS+=(--draft)
          fi

          gh release create "$TAG_NAME" release-assets/* "${RELEASE_ARGS[@]}"
