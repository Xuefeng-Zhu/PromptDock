name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: read

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

jobs:
  deploy-hosting:
    name: Build and deploy web app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: firebase-hosting
      url: https://promptdock-95e31.web.app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web app
        env:
          VITE_USE_EMULATOR: "false"
          VITE_FIREBASE_PROJECT_ID: promptdock-95e31
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN || 'promptdock-95e31.firebaseapp.com' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROMPTDOCK_95E31 }}
          projectId: promptdock-95e31
          channelId: live
