version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: production
      npm-development:
        dependency-type: development

  - package-ecosystem: cargo
    directory: /src-tauri
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
