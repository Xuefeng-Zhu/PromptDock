name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create or update the GitHub release as a draft"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  signing-preflight:
    name: Check macOS signing setup
    runs-on: ubuntu-latest
    outputs:
      signing_configured: ${{ steps.check.outputs.signing_configured }}

    steps:
      - name: Check Apple signing secrets
        id: check
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()

          [ -n "$APPLE_CERTIFICATE" ] || missing+=("APPLE_CERTIFICATE")
          [ -n "$APPLE_CERTIFICATE_PASSWORD" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$APPLE_ID" ] || missing+=("APPLE_ID")
          [ -n "$APPLE_PASSWORD" ] || missing+=("APPLE_PASSWORD")
          [ -n "$APPLE_TEAM_ID" ] || missing+=("APPLE_TEAM_ID")

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "signing_configured=true" >> "$GITHUB_OUTPUT"
            echo "Apple signing and notarization secrets are configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "signing_configured=false" >> "$GITHUB_OUTPUT"
          {
            echo "## macOS release skipped"
            echo
            echo "The macOS release workflow requires Apple signing and notarization secrets before it can build distributable DMGs."
            echo
            echo "Missing secrets:"
            for secret in "${missing[@]}"; do
              echo "- \`$secret\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

          printf 'Missing Apple signing secrets: %s\n' "${missing[*]}"

  build-macos:
    name: Build macOS ${{ matrix.target }}
    needs: signing-preflight
    if: needs.signing-preflight.outputs.signing_configured == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD secrets are required."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/promptdock-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_INFO="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -n 1)"
          if [ -z "$CERT_INFO" ]; then
            echo "No Developer ID Application identity found in imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          CERT_ID="$(echo "$CERT_INFO" | awk -F '"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Imported signing identity: $CERT_ID"

      - name: Check Apple notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID secrets are required for notarization."
            exit 1
          fi

      - name: Build, sign, and notarize
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}

      - name: Verify macOS signature and notarization
        run: |
          APP_PATH="$(find src-tauri/target -path "*/release/bundle/macos/PromptDock.app" -print -quit)"
          DMG_PATH="$(find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -print -quit)"

          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ]; then
            echo "Expected macOS app or DMG artifact was not found."
            find src-tauri/target -maxdepth 6 -type f -o -type d
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          spctl -a -vv "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Upload verified assets
        uses: actions/upload-artifact@v7
        with:
          name: promptdock-macos-${{ matrix.target }}
          path: release-assets/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish macOS release
    runs-on: ubuntu-latest
    needs:
      - signing-preflight
      - build-macos
    if: needs.signing-preflight.outputs.signing_configured == 'true' && needs.build-macos.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download verified assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_DRAFT: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
        run: |
          ls -la release-assets

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/*.dmg --clobber
            exit 0
          fi

          RELEASE_ARGS=(
            --title "PromptDock $TAG_NAME"
            --notes "Signed and notarized macOS build."
            --target "$GITHUB_SHA"
          )

          if [ "$RELEASE_DRAFT" = "true" ]; then
            RELEASE_ARGS+=(--draft)
          fi

          gh release create "$TAG_NAME" release-assets/*.dmg "${RELEASE_ARGS[@]}"
